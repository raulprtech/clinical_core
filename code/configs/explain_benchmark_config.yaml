experiment:
  name: "EXPLAIN-PROC-Benchmark-Backend"
  description: "Benchmark de latencia y memoria para evaluar backends de grafos (Oxigraph, Kuzu, RDFLib) bajo el estándar CLINICAL-CORE."
  
  # Modo especial para indicar que no es un entrenamiento de supervivencia
  mode: "explainability_benchmark"

  pipeline:
    # Simulamos la ingesta de conectores
    connectors: ["vision", "tabular", "text"]
    
    # Invocamos el módulo de explicabilidad
    explain:
      type: "graph_rag"
      params:
        # En el código del runner, iteraremos sobre estos
        backends_to_test: ["rdflib", "oxigraph", "kuzu"]
        llm_model: "gemini-2.5-flash" # Usando tu modelo destilado rápido
        confidence_threshold: 0.40
        iterations: 100
        
        # Opcional: Definir un grafo de prueba
        test_graph_data: |
          @prefix umls: <http://umls.org/> .
          @prefix skos: <http://www.w3.org/2004/02/skos/core#> .
          @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .

          umls:C0007097 rdfs:label "Carcinoma, Renal Cell" ;
                        umls:associated_with umls:C1332722 ;
                        skos:definition "A malignant neoplasm of the renal parenchyma..." .
          umls:C1332722 rdfs:label "VHL Gene Mutation" ;
                        skos:definition "Alteration in the von Hippel-Lindau tumor suppressor gene." .
          umls:C0018802 rdfs:label "Hematuria" ;
                        umls:symptom_of umls:C0007097 .

  # Parámetros ficticios para cumplir con el esquema del ExperimentRunner si es necesario
  data:
    dataset: "dummy"
  training:
    epochs: 0